name: PPM-Neuheiten aktualisieren

on:
  schedule:
    - cron: "15 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ppm-neuheiten
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Parser installieren
        run: python -m pip install --disable-pip-version-check beautifulsoup4==4.12.3
      - name: Kuratierte Neuheiten einlesen
        run: python scripts/import_ppm.py
      - name: Daten prüfen
        run: |
          python -m json.tool data/new-releases.json >/dev/null
          python -m json.tool data/release-rules.json >/dev/null
      - name: Änderungen veröffentlichen
        run: |
          if git diff --quiet -- data/new-releases.json; then
            echo "Keine neuen passenden Titel."
            exit 0
          fi
          git config user.name "comicarchiv-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/new-releases.json
          git commit -m "PPM-Neuheiten automatisch aktualisieren"
          git push
